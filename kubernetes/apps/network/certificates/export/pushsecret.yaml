---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/pushsecret_v1alpha1.json
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: egenintres-se-tls
spec:
  secretStoreRefs:
    - name: infisical
      kind: ClusterSecretStore
  selector:
    secret:
      name: egenintres-se-tls
  data:
    - match:
        secretKey: tls.crt
        remoteRef:
          remoteKey: egenintres-se-tls-crt
    - match:
        secretKey: tls.key
        remoteRef:
          remoteKey: egenintres-se-tls-key