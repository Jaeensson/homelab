---
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: egenintres-se-tls
  namespace: network
spec:
  hostAPI: https://app.infisical.com/api
  resyncInterval: 3600 # 1 hour - equivalent to CreatedOnce behavior
  authentication:
    universalAuth:
      secretsContext:
        secretName: infisical-universal-auth
        secretNamespace: infisical-system
  managedKubeSecretReferences:
    secretName: egenintres-se-tls
    secretNamespace: network
    creationPolicy: Orphan # Preserve secret if InfisicalSecret is deleted
    template:
      type: kubernetes.io/tls
      metadata:
        annotations:
          cert-manager.io/alt-names: "*.test.egenintres.se,test.egenintres.se"
          cert-manager.io/certificate-name: egenintres-se
          cert-manager.io/common-name: ""
          cert-manager.io/ip-sans: ""
          cert-manager.io/issuer-group: ""
          cert-manager.io/issuer-kind: ClusterIssuer
          cert-manager.io/issuer-name: letsencrypt-production
          cert-manager.io/uri-sans: ""
        labels:
          controller.cert-manager.io/fao: "true"
      data:
        tls.crt: "{{ .egenintres-se-tls-crt }}"
        tls.key: "{{ .egenintres-se-tls-key }}"
  source:
    projectId: "34bcf314-3513-4e8d-9ce9-a9d3246232e9"
    envSlug: "prod"
    path: "/"
