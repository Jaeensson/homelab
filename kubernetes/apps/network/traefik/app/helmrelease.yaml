apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
spec:
  chartRef:
    kind: OCIRepository
    name: traefik
  interval: 1h
  values:
    ports:
      web:
        port: 80
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true

      websecure:
        port: 443

    # Enables the dashboard in Secure Mode
    api:
      dashboard: true
      insecure: false

    providers:
      kubernetesGateway:
        enabled: true

    gateway: 
      enabled: false
    gatewayClass: 
      enabled: false
