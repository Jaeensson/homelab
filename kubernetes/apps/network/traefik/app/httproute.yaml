---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: traefik
spec:
  parentRefs:
    - name: traefik
      sectionName: http
      kind: Gateway

  hostnames:
    - traefik.test.egenintres.se

  rules:
    - backendRefs:
        - name: traefik
          namespace: network
          port: 8080

      matches:
        - path:
            type: PathPrefix
            value: /
