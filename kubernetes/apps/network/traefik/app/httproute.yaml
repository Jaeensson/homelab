---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: traefik
spec:
  parentRefs:
    - name: traefik
      kind: Gateway

  hostnames:
    - traefik.test.egenintres.se

  rules:
    - backendRefs:
        - name: api@internal
          kind: TraefikService
          group: traefik.io

      matches:
        - path:
            type: PathPrefix
            value: /dashboard
        - path:
            type: PathPrefix
            value: /api
