apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
spec:
  chartRef:
    kind: OCIRepository
    name: traefik
  interval: 1h
  values:
    ports:
      # Defines the HTTP entry point named 'web'
      web:
        port: 80
        nodePort: 30000
        # Instructs this entry point to redirect all traffic to the 'websecure' entry point
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true

      # Defines the HTTPS entry point named 'websecure'
      websecure:
        port: 443
        nodePort: 30001

    # Enables the dashboard in Secure Mode
    api:
      dashboard: true
      insecure: false

    #providers:
      #kubernetesGateway:
        #enabled: true