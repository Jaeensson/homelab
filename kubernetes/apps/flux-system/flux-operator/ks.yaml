
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
  interval: 10m0s
  path: ./kubernetes/apps/flux-system/flux-operator/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
