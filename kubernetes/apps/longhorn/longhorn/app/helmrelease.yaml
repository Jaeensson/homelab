---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
spec:
  releaseName: longhorn
  interval: 1h
  chart:
    spec:
      chart: longhorn
      version: "1.11.0"
      sourceRef:
        kind: HelmRepository
        name: longhorn
  values:
    controllerManager:
      serviceAccount:
        create: true
    httproute:
      enabled: true
      parentRefs:
        - name: traefik
          kind: Gateway
          namespace: network
      hostnames:
        - longhorn.test.egenintres.se
