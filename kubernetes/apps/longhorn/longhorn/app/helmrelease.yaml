---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn
spec:
  releaseName: longhorn
  interval: 1h
  chart:
    spec:
      chart: longhorn
      version: 1.11.0
      sourceRef:
        kind: HelmRepository
        name: longhorn
  values:
    persistence:
      defaultClassReplicaCount: 2
      reclaimPolicy: Retain
    defaultSettings:
      createDefaultDiskLabeledNodes: true
      defaultReplicaCount: "2"
      defaultDataPath: "/var/mnt/longhorn/"
      reclaimPolicy: Retain
    httproute:
      enabled: true
      parentRefs:
        - name: traefik
          kind: Gateway
          namespace: network
      hostnames:
        - longhorn.test.egenintres.se
