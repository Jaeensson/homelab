---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: secrets-operator
spec:
  releaseName: secrets-operator
  interval: 1h
  chart:
    spec:
      chart: secrets-operator
      version: "0.10.25" # Always check for the latest 2026 version
      sourceRef:
        kind: HelmRepository
        name: infisical-charts
  install:
    createNamespace: true
  values:
    controllerManager:
      serviceAccount:
        create: true
