---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile
repositories:
  - name: infisical
    url: https://dl.cloudsmith.io/public/infisical/helm-charts/helm/charts/
  - name: longhorn
    url: https://charts.longhorn.io
helmDefaults:
  cleanupOnFail: true
  wait: true
  waitForJobs: true
  createNamespace: true
releases:
  - name: longhorn
    namespace: longhorn
    chart: longhorn/longhorn
    version: 1.11.0
    values:
      - ./templates/values.yaml.gotmpl
  - name: secrets-operator
    namespace: infisical-system
    chart: infisical/secrets-operator
    version: 0.10.25
    values:
      - ./templates/values.yaml.gotmpl
    needs:
      - longhorn/longhorn
  - name: cert-manager
    namespace: cert-manager
    chart: oci://quay.io/jetstack/charts/cert-manager
    version: v1.19.4
    values:
      - ./templates/values.yaml.gotmpl
    needs:
      - infisical-system/secrets-operator
  - name: flux-operator
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
    version: 0.43.0
    values:
      - ./templates/values.yaml.gotmpl
    needs:
      - cert-manager/cert-manager
  - name: flux-instance
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
    version: 0.43.0
    values:
      - ./templates/values.yaml.gotmpl
    needs:
      - flux-system/flux-operator
